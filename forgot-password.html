<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | ShopVerse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="assets/css/auth.css">

</head>

<body>

<div class="auth-container">

<div class="auth-left">

<div class="logo">

<i class="fa-solid fa-cart-shopping"></i>

<span>ShopVerse</span>

</div>

<h1>Forgot Password?</h1>

<p>

Enter your registered email address.

We'll send you a password reset link.

</p>

<img src="assets/images/forgot-password.svg"
alt="Forgot Password">

</div>

<div class="auth-right">

<div class="auth-card">

<h2>Reset Password</h2>

<p class="subtitle">

Receive a password reset email instantly.

</p>

<div id="resetMessage"
class="login-message"
style="display:none;"></div>

<form id="forgotPasswordForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

</div>

<button
type="submit"
class="login-btn-full">

<i class="fa-solid fa-paper-plane"></i>

Send Reset Link

</button>

</form>

<div class="auth-links">

<a href="login.html">

<i class="fa-solid fa-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</div>

</div>
<div class="loading-overlay" id="loadingOverlay">

<div class="loader"></div>

<p>Sending reset link...</p>

</div>

<script type="module" src="assets/js/firebase-config.js"></script>
<script type="module" src="assets/js/forgot-password.js"></script>

</body>
</html>
